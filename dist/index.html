  background:var(--night);
  color:var(--ink);
  font-family:var(--body);
  font-size:15px;
  line-height:1.5;
  overflow-x:hidden;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

a{color:var(--gold-hi);text-decoration:none}

:focus-visible{outline:2px solid var(--gold-hi);outline-offset:2px}

/* ============ HEADER ============ */
header{
  display:flex;align-items:center;gap:20px;
  padding:10px 20px 0;
  flex-wrap:wrap;
}
.wordmark{font-family:var(--disp);font-weight:700;font-size:26px;letter-spacing:.04em;line-height:1;text-transform:uppercase;white-space:nowrap}
.wordmark em{font-style:normal;color:var(--gold)}
.stage-tag{font-family:var(--disp);font-weight:500;font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink-dim);white-space:nowrap}
.stage-tag b{color:var(--live);font-weight:500}
nav{display:flex;gap:4px;margin-left:auto}
nav button{
  font-family:var(--disp);font-weight:500;font-size:14px;letter-spacing:.14em;text-transform:uppercase;
  padding:8px 16px;color:var(--ink-dim);
  border-bottom:2px solid transparent;
}
nav button:hover{color:var(--ink)}
nav button[aria-selected="true"]{color:var(--ink);border-bottom-color:var(--gold)}

/* ============ TICKER ============ */
.ticker{
  border-top:1px solid var(--edge);border-bottom:1px solid var(--edge);
  margin-top:10px;overflow:hidden;white-space:nowrap;
  background:var(--night-2);
}
.ticker-track{display:inline-block;padding:6px 0;animation:tick 90s linear infinite}
@keyframes tick{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tick-item{display:inline-flex;align-items:baseline;gap:8px;padding:0 26px;font-size:13px;color:var(--ink-dim)}
.tick-item .sc{font-family:var(--disp);font-weight:700;font-size:14px;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:.05em}
.tick-item .rd{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
@media (prefers-reduced-motion: reduce){
  .ticker-track{animation:none;padding-left:0}
  .world{animation:none !important}
  .beam{display:none}
}

/* ============ VIEWS ============ */
main{flex:1;display:flex;flex-direction:column;min-height:0}
.view{display:none;flex:1;min-height:0}
.view.on{display:flex;flex-direction:column}

/* ============ PITCH VIEW ============ */
#view-pitch{position:relative}
.arena{
  position:relative;flex:1;min-height:520px;overflow:hidden;
}
/* stadium bowl + crowd shimmer */
.arena::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(120% 70% at 50% 108%, rgba(18,114,68,.28), transparent 55%),
    radial-gradient(90% 46% at 50% -6%, #1a2438 0%, #101827 34%, transparent 68%),
    var(--night);
}
.crowd{
  position:absolute;left:-10%;right:-10%;top:0;height:34%;
  background:
    repeating-linear-gradient(90deg, rgba(233,236,242,.05) 0 2px, transparent 2px 5px),
    repeating-linear-gradient(0deg, rgba(233,236,242,.035) 0 2px, transparent 2px 6px),
    linear-gradient(180deg,#151f33 0%, #0d1524 90%, transparent 100%);
  transform:perspective(700px) rotateX(38deg);
  transform-origin:bottom center;
  opacity:.9;
}
.beam{
  position:absolute;top:-12%;width:34%;height:70%;
  background:linear-gradient(190deg, rgba(236,240,248,.10), transparent 68%);
  filter:blur(6px);pointer-events:none;
  animation:beam 11s ease-in-out infinite alternate;
}
.beam.l{left:2%;transform:rotate(14deg)}
.beam.r{right:2%;transform:rotate(-14deg) scaleX(-1);animation-delay:-5s}
@keyframes beam{from{opacity:.5}to{opacity:1}}

.stage{
  position:absolute;inset:0;
  perspective:1150px;perspective-origin:50% 30%;
}
.world{
  position:absolute;left:50%;top:56%;
  width:min(62vw, 760px);aspect-ratio:68/92;
  transform-style:preserve-3d;
  transform:translate(-50%,-50%) rotateX(var(--tilt,54deg)) rotateZ(0deg);
  animation:sway 16s ease-in-out infinite alternate;
}
@keyframes sway{
  from{transform:translate(-50%,-50%) rotateX(var(--tilt,54deg)) rotateZ(-2.2deg)}
  to  {transform:translate(-50%,-50%) rotateX(var(--tilt,54deg)) rotateZ(2.2deg)}
}
.pitch{
  position:absolute;inset:0;
  background:
    repeating-linear-gradient(0deg, var(--grass) 0 12.5%, var(--grass-2) 12.5% 25%);
  border:2px solid var(--line);
  border-radius:6px;
  box-shadow:0 0 0 14px rgba(7,11,18,.55), 0 0 90px rgba(18,114,68,.45);
}
/* markings */
.pitch i{position:absolute;border:2px solid var(--line);pointer-events:none}
.mk-half{left:0;right:0;top:50%;border-width:1px 0 0 0}
.mk-circle{left:50%;top:50%;width:26%;aspect-ratio:1;border-radius:50%;transform:translate(-50%,-50%)}
.mk-spot{left:50%;top:50%;width:5px;height:5px;border-radius:50%;background:var(--line);border:none;transform:translate(-50%,-50%)}
.mk-boxT{left:21%;right:21%;top:-2px;height:17%;border-top:none}
.mk-boxB{left:21%;right:21%;bottom:-2px;height:17%;border-bottom:none}
.mk-goalT{left:36%;right:36%;top:-2px;height:6%;border-top:none}
.mk-goalB{left:36%;right:36%;bottom:-2px;height:6%;border-bottom:none}
.mk-dT{left:50%;top:17%;width:18%;aspect-ratio:2/1;border-radius:0 0 200px 200px;border-top:none;transform:translateX(-50%)}
.mk-dB{left:50%;bottom:17%;width:18%;aspect-ratio:2/1;border-radius:200px 200px 0 0;border-bottom:none;transform:translateX(-50%)}

/* player pins — billboards standing on the pitch */
.pin{
  position:absolute;width:0;height:0;
  transform-style:preserve-3d;
}
.pin>button{
  position:absolute;left:0;bottom:0;
  transform:translate(-50%,0) rotateX(calc(var(--tilt,54deg) * -1));
  transform-origin:bottom center;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  transition:filter .15s;
}
.pin>button:hover{filter:brightness(1.25)}
.shirt{
  width:44px;height:44px;border-radius:50%;
  display:grid;place-items:center;
  font-family:var(--disp);font-weight:700;font-size:19px;
  background:var(--kit,#333);color:var(--kit-ink,#fff);
  border:2px solid rgba(233,236,242,.75);
  box-shadow:0 10px 14px -6px rgba(0,0,0,.7);
}
.pin.star .shirt{border-color:var(--gold-hi);box-shadow:0 0 14px rgba(201,162,39,.55),0 10px 14px -6px rgba(0,0,0,.7)}
.plate{
  font-family:var(--disp);font-weight:500;font-size:11.5px;letter-spacing:.09em;text-transform:uppercase;
  background:rgba(7,11,18,.78);padding:2px 7px;border-radius:3px;white-space:nowrap;
}
.pin .shadow{
  position:absolute;left:0;top:0;width:34px;height:34px;border-radius:50%;
  transform:translate(-50%,-50%) scale(1,.9);
  background:radial-gradient(closest-side, rgba(0,0,0,.45), transparent);
}

/* team rail + info */
.team-rail{
  position:absolute;left:16px;top:14px;z-index:5;
  display:flex;flex-direction:column;gap:6px;max-height:calc(100% - 28px);overflow-y:auto;
  scrollbar-width:thin;
}
.chip{
  display:flex;align-items:center;gap:9px;
  padding:7px 12px;border:1px solid var(--edge);border-radius:4px;
  background:rgba(11,18,32,.82);
  font-family:var(--disp);font-weight:500;font-size:13px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--ink-dim);
}
.chip:hover{color:var(--ink);border-color:rgba(147,160,180,.4)}
.chip[aria-selected="true"]{color:var(--ink);border-color:var(--gold);background:rgba(201,162,39,.10)}
.flag{width:22px;height:15px;border-radius:2px;flex:none;background:var(--fl,#555);box-shadow:0 0 0 1px rgba(0,0,0,.4)}
.team-info{
  position:absolute;right:16px;top:14px;z-index:5;text-align:right;
  background:rgba(11,18,32,.82);border:1px solid var(--edge);border-radius:4px;
  padding:12px 16px;max-width:250px;
}
.team-info h2{font-family:var(--disp);font-weight:700;font-size:24px;letter-spacing:.05em;text-transform:uppercase;line-height:1.1}
.team-info .nick{color:var(--gold-hi);font-size:12.5px;font-style:italic;margin-top:2px}
.team-info dl{margin-top:9px;display:grid;grid-template-columns:auto auto;gap:2px 14px;font-size:12px;justify-content:end}
.team-info dt{color:var(--ink-dim);letter-spacing:.06em;text-transform:uppercase;font-size:10.5px;align-self:baseline}
.team-info dd{font-variant-numeric:tabular-nums;text-align:right}
.hint{
  position:absolute;left:50%;bottom:12px;transform:translateX(-50%);z-index:5;
  font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);
  background:rgba(7,11,18,.6);padding:4px 12px;border-radius:99px;white-space:nowrap;
}

/* ============ CARD MODAL ============ */
.card-scene{
  position:fixed;inset:0;z-index:50;display:none;
  align-items:center;justify-content:center;
  background:rgba(4,7,12,.72);backdrop-filter:blur(5px);
  perspective:1400px;
}
.card-scene.on{display:flex}
.card3d{
  width:min(330px, 88vw);aspect-ratio:63/88;position:relative;
  transform-style:preserve-3d;
  transition:transform .6s cubic-bezier(.2,.7,.2,1);
  cursor:pointer;
}
.card3d.flipped{transform:rotateY(180deg)}
.cface{
  position:absolute;inset:0;border-radius:14px;overflow:hidden;
  backface-visibility:hidden;
  border:1px solid rgba(201,162,39,.55);
  background:
    radial-gradient(120% 90% at 50% -10%, color-mix(in srgb, var(--kit) 38%, var(--night-3)) 0%, var(--night-3) 60%),
    var(--night-3);
  box-shadow:0 30px 70px -20px rgba(0,0,0,.85), 0 0 40px rgba(201,162,39,.14);
  display:flex;flex-direction:column;
}
.cface.back{transform:rotateY(180deg)}
.cface .top{display:flex;justify-content:space-between;align-items:flex-start;padding:16px 18px 0}
.cface .num{font-family:var(--disp);font-weight:700;font-size:46px;line-height:.9;color:var(--gold-hi)}
.cface .pos{font-family:var(--disp);font-weight:500;font-size:13px;letter-spacing:.22em;color:var(--ink-dim);text-transform:uppercase;text-align:right}
.cface .crest{width:30px;height:20px;border-radius:2px;background:var(--fl,#555);margin-top:6px;margin-left:auto;box-shadow:0 0 0 1px rgba(0,0,0,.4)}
.cface .silhouette{
  flex:1;display:grid;place-items:center;position:relative;min-height:0;
}
.silhouette .shirt{width:84px;height:84px;font-size:36px}
.cface h3{
  font-family:var(--disp);font-weight:700;font-size:28px;letter-spacing:.04em;text-transform:uppercase;
  text-align:center;line-height:1.05;text-wrap:balance;padding:0 14px;
}
.cface .club{font-size:12px;color:var(--ink-dim);text-align:center;margin-top:3px}
.statrow{
  display:grid;grid-template-columns:repeat(3,1fr);
  border-top:1px solid rgba(201,162,39,.3);margin-top:14px;
}
.statrow div{padding:10px 6px;text-align:center;border-left:1px solid rgba(201,162,39,.16)}
.statrow div:first-child{border-left:none}
.statrow b{display:block;font-family:var(--disp);font-weight:700;font-size:24px;font-variant-numeric:tabular-nums;color:var(--gold-hi)}
.statrow span{font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim)}
.cface.back .bk{padding:18px;display:flex;flex-direction:column;gap:12px;flex:1}
.cface.back h3{text-align:left;padding:0;font-size:22px}
.cface.back .note{font-size:13px;color:var(--ink);line-height:1.55}
.cface.back dl{display:grid;grid-template-columns:auto 1fr;gap:5px 14px;font-size:12.5px}
.cface.back dt{color:var(--ink-dim);text-transform:uppercase;font-size:10.5px;letter-spacing:.08em;align-self:baseline}
.cface.back dd{font-variant-numeric:tabular-nums}
.srcline{margin-top:auto;font-size:12px;border-top:1px solid rgba(201,162,39,.3);padding-top:10px}
.srcline a{display:inline-flex;gap:6px;align-items:center}
.flip-hint{position:absolute;left:0;right:0;bottom:-30px;text-align:center;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim)}
.card-close{
  position:absolute;top:18px;right:22px;z-index:51;
  font-family:var(--disp);font-size:14px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);
  padding:8px 12px;
}
.card-close:hover{color:var(--ink)}

/* ============ BRACKET ============ */
#view-bracket{overflow:auto;padding:22px 20px 34px}
.bracket{display:flex;gap:26px;min-width:max-content;align-items:stretch}
.round-col{display:flex;flex-direction:column;min-width:224px}
.round-col h3{
  font-family:var(--disp);font-weight:500;font-size:13px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--ink-dim);margin-bottom:12px;position:sticky;top:-22px;background:var(--night);padding:6px 0;z-index:2;
}
.round-col h3 b{color:var(--gold);font-weight:500}
.mcells{display:flex;flex-direction:column;justify-content:space-around;gap:10px;flex:1}
.mcell{
  border:1px solid var(--edge);border-radius:5px;background:var(--night-3);
  padding:8px 10px;font-size:13px;
}
.mcell.upcoming{border-style:dashed;background:rgba(17,26,44,.5)}
.mcell .meta{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:5px;display:flex;justify-content:space-between;gap:8px}
.mrow{display:flex;align-items:center;gap:8px;padding:2px 0}
.mrow .tn{font-family:var(--disp);font-weight:500;font-size:14.5px;letter-spacing:.07em;text-transform:uppercase;flex:1}
.mrow .ms{font-family:var(--disp);font-weight:700;font-size:16px;font-variant-numeric:tabular-nums;min-width:16px;text-align:right}
.mrow.win .tn,.mrow.win .ms{color:var(--gold-hi)}
.mrow.lose{opacity:.5}
.mcell.final-cell{border-color:var(--gold);box-shadow:0 0 24px rgba(201,162,39,.18)}

/* ============ PLAYERS / GOLDEN BOOT ============ */
#view-players{overflow:auto;padding:22px 20px 40px}
.gb-wrap{max-width:1180px;margin:0 auto;display:flex;flex-direction:column;gap:30px}
.gb-head h2, .gallery-head h2{font-family:var(--disp);font-weight:700;font-size:22px;letter-spacing:.08em;text-transform:uppercase}
.gb-head h2 em, .gallery-head h2 em{font-style:normal;color:var(--gold)}
.gb-head p, .gallery-head p{color:var(--ink-dim);font-size:13px;margin-top:3px;max-width:64ch}
table.gb{border-collapse:collapse;width:100%;max-width:660px}
table.gb th{
  text-align:left;font-family:var(--disp);font-weight:500;font-size:11px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--ink-dim);padding:8px 12px;border-bottom:1px solid var(--edge);
}
table.gb td{padding:9px 12px;border-bottom:1px solid rgba(147,160,180,.09);font-variant-numeric:tabular-nums}
table.gb td.n{font-family:var(--disp);font-weight:700;color:var(--gold-hi);font-size:15px}
table.gb td.g{font-family:var(--disp);font-weight:700;font-size:17px}
table.gb tr:first-child td{background:rgba(201,162,39,.06)}
.gb-scroll{overflow-x:auto}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:18px}
.gcard-holder{perspective:900px}
.gcard{
  width:100%;aspect-ratio:63/88;position:relative;transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.2,.7,.2,1);cursor:pointer;
}
.gcard.flipped{transform:rotateY(180deg)}
.gcard .cface .num{font-size:34px}
.gcard .cface h3{font-size:21px}
.gcard .silhouette .shirt{width:64px;height:64px;font-size:28px}
.gcard .statrow b{font-size:19px}
.gcard .cface.back h3{font-size:18px}
.gcard .cface.back .note{font-size:12px}

/* ============ SOURCES FOOTER ============ */
footer{
  border-top:1px solid var(--edge);background:var(--night-2);
  padding:10px 20px;font-size:12px;color:var(--ink-dim);
  display:flex;gap:8px 22px;flex-wrap:wrap;align-items:baseline;
}
footer .lbl{font-family:var(--disp);font-weight:500;font-size:10.5px;letter-spacing:.2em;text-transform:uppercase}

/* ============ FACES ============ */
.shirt.has-face{padding:0;overflow:visible;background:var(--kit,#222);position:relative}
.shirt.has-face img{width:100%;height:100%;border-radius:50%;object-fit:cover;object-position:50% 22%;display:block}
.shirt.has-face b{
  position:absolute;right:-4px;bottom:-4px;min-width:17px;height:17px;padding:0 3px;
  border-radius:9px;background:var(--kit,#111);color:var(--kit-ink,#fff);
  font-family:var(--disp);font-weight:700;font-size:11px;line-height:1;
  display:grid;place-items:center;border:1.5px solid rgba(7,11,18,.72);
}
.pin.star .shirt.has-face img{box-shadow:inset 0 0 0 2px var(--gold-hi)}
.portrait{
  width:132px;height:132px;border-radius:50%;overflow:visible;position:relative;
  background:var(--night);box-shadow:0 12px 28px -10px rgba(0,0,0,.75);
}
.portrait img{width:100%;height:100%;border-radius:50%;object-fit:cover;object-position:50% 20%;
  display:block;border:3px solid rgba(233,236,242,.22)}
.portrait.star img{border-color:var(--gold-hi);box-shadow:0 0 24px rgba(201,162,39,.4)}
.portrait .pnum{
  position:absolute;right:-4px;bottom:-2px;min-width:32px;height:32px;padding:0 7px;
  border-radius:16px;background:var(--kit,#111);color:var(--kit-ink,#fff);
  font-family:var(--disp);font-weight:700;font-size:18px;line-height:1;
  display:grid;place-items:center;border:2px solid var(--night-3);
}
.gcard .portrait{width:94px;height:94px}
.gcard .portrait .pnum{min-width:24px;height:24px;font-size:14px;border-width:2px}
.photocredit{font-size:10.5px;color:var(--ink-dim);margin-top:8px;line-height:1.45}
.photocredit a{color:var(--gold-hi)}

@media (max-width: 760px){
  .world{width:88vw;top:60%}
  .team-info{position:static;max-width:none;text-align:left;margin:10px 16px;order:2}
  .team-rail{position:static;flex-direction:row;flex-wrap:wrap;margin:10px 16px 0;max-height:none}
  #view-pitch{overflow:auto}
  .arena{min-height:480px;flex:none}
  .shirt{width:36px;height:36px;font-size:16px}
  nav{width:100%;margin-left:0}
}
</style>

<footer id="srcFooter"></footer>

<!-- card modal -->

/* ---------- helpers ---------- */
const $ = s => document.querySelector(s);
const el = (tag, cls, html) => { const n=document.createElement(tag); if(cls)n.className=cls; if(html!=null)n.innerHTML=html; return n; };
const esc = s => String(s??'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const teamOf = code => DATA.teams[code];
const nameOf = code => teamOf(code) ? teamOf(code).name : (DATA.teamNames?.[code] || code);
const flagOf = code => teamOf(code)?.flag || DATA.flags?.[code] || 'linear-gradient(#556,#334)';
const faceOf = name => (DATA.faces && DATA.faces[name]) || null;
const photoCredit = name => { const f=faceOf(name); return f&&f.credit
  ? `<div class="photocredit">Photo: ${esc(f.credit)} · ${esc(f.license)}${f.src?` · <a href="${esc(f.src)}" target="_blank" rel="noopener">source ↗</a>`:''}</div>`
  : ''; };

/* ---------- formation coords ---------- */
function formationCoords(formation){
  // returns [{x,y}] for XI in lineup order: GK first, then defense→attack rows
  const rows = formation.split('-').map(Number);
  const pts = [{x:50, y:90}]; // GK
  const yTop=16, yBot=76;                       // attack..defense band
  const n = rows.length;
  rows.forEach((count,i)=>{
    const y = yBot - (yBot-yTop) * (i/(n-1||1));
    for(let k=0;k<count;k++){
      const x = (100/(count+1))*(k+1);
      pts.push({x,y});
    }
  });
  return pts;
}

/* ---------- pitch view ---------- */
let currentTeam = DATA.defaultTeam || Object.keys(DATA.teams)[0];

function renderRail(){
  const rail = $('#teamRail'); rail.innerHTML='';
  Object.entries(DATA.teams).forEach(([code,t])=>{
    const b = el('button','chip');
    b.setAttribute('role','tab');
    b.setAttribute('aria-selected', code===currentTeam);
    b.innerHTML = `<span class="flag" style="--fl:${t.flag}"></span>${esc(code)}`;
    b.title = t.name;
    b.addEventListener('click', ()=>{ currentTeam=code; renderRail(); renderTeam(); });
    rail.appendChild(b);
  });
}

function renderTeam(){
  const t = teamOf(currentTeam);
  const pins = $('#pins'); pins.innerHTML='';
  const coords = formationCoords(t.formation);
  const starNames = new Set((t.stars||[]).map(s=>s.name));
  t.lineup.forEach((p,i)=>{
    const c = coords[i] || {x:50,y:50};
    const pin = el('div','pin'+(starNames.has(p.name)?' star':''));
    pin.style.left = c.x+'%'; pin.style.top = c.y+'%';
    const surname = p.name.split(' ').slice(-1)[0];
    const pf = faceOf(p.name);
    const badge = pf
      ? `<span class="shirt has-face" style="--kit:${t.colors.p};--kit-ink:${t.colors.ink||'#fff'}"><img src="${esc(pf.img)}" alt="" loading="lazy"><b>${p.num??''}</b></span>`
      : `<span class="shirt" style="--kit:${t.colors.p};--kit-ink:${t.colors.ink||'#fff'}">${p.num??''}</span>`;
    pin.innerHTML = `<span class="shadow"></span>
      <button aria-label="${esc(p.name)}">
        ${badge}<span class="plate">${esc(surname)}</span>
      </button>`;
    pin.querySelector('button').addEventListener('click', ()=>openCard(p, t));
    pins.appendChild(pin);
  });
  $('#teamInfo').innerHTML = `
    <h2>${esc(t.name)}</h2>
    <div class="nick">${esc(t.nickname||'')}</div>
    <dl>
      <dt>Coach</dt><dd>${esc(t.coach||'—')}</dd>
      <dt>Formation</dt><dd>${esc(t.formation)}</dd>
      <dt>FIFA rank</dt><dd>${t.rank??'—'}</dd>
    </dl>`;
}

/* ---------- cards ---------- */
function cardHTML(p, t, compact){
  const star = (t.stars||[]).find(s=>s.name===p.name) || (p.wcG!=null ? p : null);
  const s = star || p;
  const stats = star ? `
    <div class="statrow">
      <div><b>${s.wcG??0}</b><span>WC26 goals</span></div>
      <div><b>${s.wcA??'—'}</b><span>Assists</span></div>
      <div><b>${s.min??'—'}</b><span>Minutes</span></div>
    </div>` : `
    <div class="statrow">
      <div><b>${p.num??'—'}</b><span>Shirt</span></div>
      <div><b>${esc(p.pos||'—')}</b><span>Position</span></div>
      <div><b>${esc(t.formation)}</b><span>System</span></div>
    </div>`;
  const back = star ? `
    <div class="cface back" style="--kit:${t.colors.p};--fl:${t.flag}">
      <div class="bk">
        <h3>${esc(s.name)}</h3>
        <dl>
          <dt>Team</dt><dd>${esc(t.name)}</dd>
          <dt>Club</dt><dd>${esc(s.club||'—')}</dd>
          <dt>Age</dt><dd>${s.age??'—'}</dd>
          <dt>Position</dt><dd>${esc(s.pos||p.pos||'—')}</dd>
        </dl>
        <div class="note">${esc(s.note||'')}</div>
        <div class="srcline">${s.src?`Stats source: <a href="${esc(s.src)}" target="_blank" rel="noopener">${esc(srcLabel(s.src))} ↗</a>`:'Lineup data — see footer sources'}</div>
        ${photoCredit(s.name)}
      </div>
    </div>` : `
    <div class="cface back" style="--kit:${t.colors.p};--fl:${t.flag}">
      <div class="bk">
        <h3>${esc(p.name)}</h3>
        <dl>
          <dt>Team</dt><dd>${esc(t.name)}</dd>
          <dt>Shirt</dt><dd>${p.num??'—'}</dd>
          <dt>Position</dt><dd>${esc(p.pos||'—')}</dd>
        </dl>
        <div class="note">Starting XI from ${esc(t.name)}'s last knockout match.</div>
        <div class="srcline">Lineup data — see footer sources</div>
        ${photoCredit(p.name)}
      </div>
    </div>`;
  return `
    <div class="cface front" style="--kit:${t.colors.p};--fl:${t.flag}">
      <div class="top">
        <div class="num">${p.num??s.num??''}</div>
        <div><div class="pos">${esc(s.pos||p.pos||'')}</div><div class="crest"></div></div>
      </div>
      <div class="silhouette">
        ${(()=>{const f=faceOf(s.name||p.name),num=p.num??s.num??'';return f
          ? `<div class="portrait ${star?'star':''}"><img src="${esc(f.img)}" alt="${esc(s.name||p.name)}"><span class="pnum" style="--kit:${t.colors.p};--kit-ink:${t.colors.ink||'#fff'}">${num}</span></div>`
          : `<span class="shirt" style="--kit:${t.colors.p};--kit-ink:${t.colors.ink||'#fff'}">${num}</span>`;})()}
      </div>
      <h3>${esc(s.name||p.name)}</h3>
      <div class="club">${esc(s.club||t.name)}</div>
      ${stats}
    </div>${back}`;
}
function srcLabel(url){
  try{ return new URL(url).hostname.replace('www.',''); }catch(e){ return 'source'; }
}

const scene = $('#cardScene'), card = $('#card3d');
let tiltRAF = null;
function openCard(p, t){
  card.className='card3d';
  card.innerHTML = cardHTML(p, t);
  scene.classList.add('on');
}
card.addEventListener('click', ()=>card.classList.toggle('flipped'));
$('#cardClose').addEventListener('click', ()=>scene.classList.remove('on'));
scene.addEventListener('click', e=>{ if(e.target===scene) scene.classList.remove('on'); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') scene.classList.remove('on'); });
scene.addEventListener('mousemove', e=>{
  if(matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const r = card.getBoundingClientRect();
  const dx = (e.clientX - (r.left+r.width/2)) / r.width;
  const dy = (e.clientY - (r.top+r.height/2)) / r.height;
  const flip = card.classList.contains('flipped') ? 180 : 0;
  card.style.transform = `rotateY(${flip + dx*14}deg) rotateX(${-dy*12}deg)`;
});
scene.addEventListener('mouseleave', ()=>{ card.style.transform=''; });

/* ---------- bracket ---------- */
(function(){
  const order = ['R32','R16','QF','SF','F'];
  const titles = {R32:'Round of 32', R16:'Round of 16', QF:'Quarter-finals', SF:'Semi-finals', F:'<b>Final</b>'};
  const wrap = $('#bracket');
  order.forEach(rd=>{
    const ms = DATA.matches.filter(m=>m.round===rd);
    if(!ms.length) return;
    const col = el('div','round-col');
    col.appendChild(el('h3',null,titles[rd]));
    const cells = el('div','mcells');
    ms.forEach(m=>{
      const up = m.status==='upcoming';
      const cell = el('div','mcell'+(up?' upcoming':'')+(rd==='F'?' final-cell':''));
      const aWin = !up && (m.sa>m.sb || m.pw===m.a);
      const bWin = !up && (m.sb>m.sa || m.pw===m.b);
      cell.innerHTML = `
        <div class="meta"><span>${esc(m.date||'')}</span><span>${esc(m.venue||'')}</span></div>
        <div class="mrow ${aWin?'win':''} ${bWin?'lose':''}"><span class="flag" style="--fl:${flagOf(m.a)}"></span><span class="tn">${esc(nameOf(m.a))}</span><span class="ms">${up?'':m.sa}</span></div>
        <div class="mrow ${bWin?'win':''} ${aWin?'lose':''}"><span class="flag" style="--fl:${flagOf(m.b)}"></span><span class="tn">${esc(nameOf(m.b))}</span><span class="ms">${up?'':m.sb}</span></div>
        ${m.pens?`<div class="meta" style="margin:4px 0 0">${esc(nameOf(m.pw))} win ${esc(m.pens)} on penalties</div>`:''}`;
      cells.appendChild(cell);
    });
    col.appendChild(cells);
    wrap.appendChild(col);
  });
})();

/* ---------- golden boot ---------- */
(function(){
  const tb = $('#gbTable');
  tb.innerHTML = `<tr><th>#</th><th>Player</th><th>Team</th><th>Goals</th><th>Assists</th></tr>` +
    DATA.topScorers.map((s,i)=>`<tr>
      <td class="n">${i+1}</td>
      <td>${esc(s.name)}</td>
      <td><span style="display:inline-flex;align-items:center;gap:7px"><span class="flag" style="--fl:${flagOf(s.country)}"></span>${esc(nameOf(s.country))}</span></td>
      <td class="g">${s.goals}</td>
      <td>${s.assists??'—'}</td>
    </tr>`).join('');
  $('#gbNote').textContent = DATA.gbNote || '';

  const gal = $('#gallery');
  Object.values(DATA.teams).forEach(t=>{
    (t.stars||[]).forEach(s=>{
      const holder = el('div','gcard-holder');
      const g = el('div','gcard');
      const asPlayer = t.lineup.find(p=>p.name===s.name) || {name:s.name,num:s.num,pos:s.pos};
      g.innerHTML = cardHTML(asPlayer, t, true);
      g.addEventListener('click', ()=>g.classList.toggle('flipped'));
      holder.appendChild(g);
      gal.appendChild(holder);
    });
  });
})();

/* ---------- footer sources ---------- */
$('#srcFooter').innerHTML = `<span class="lbl">Sources · updated ${esc(DATA.updated)}</span>` +
  DATA.sources.map(s=>`<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.topic)}</a>`).join('') +
  `<a href="about.html" style="margin-left:auto;color:var(--gold)">About this project</a>`;

/* ---------- init ---------- */
if(DATA.stageTag) $('#stageTag').innerHTML = DATA.stageTag;
renderRail(); renderTeam();
</script>
